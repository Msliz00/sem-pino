<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEM PINO 💣 Painel da Equipe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================ -->
  <!-- TELA DE LOGIN                                -->
  <!-- ============================================ -->
  <section id="screen-login" class="screen active">
    <div class="auth-card">
      <div class="logo-wrap">
        <div class="granada-logo">
          <div class="granada-body"></div>
          <div class="granada-anel"></div>
          <div class="granada-pino"></div>
          <div class="granada-spark"></div>
        </div>
        <h1 class="logo-title">SEM PINO</h1>
        <p class="logo-sub">Painel da Equipe</p>
      </div>

      <form id="form-login" class="auth-form" autocomplete="on">
        <div class="field">
          <label for="login-user">Usuário</label>
          <input type="text" id="login-user" name="username" placeholder="seu.user" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="login-pass">Senha</label>
          <div class="pass-wrap">
            <input type="password" id="login-pass" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="pass-toggle" data-target="login-pass" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="login-remember" checked>
          <span>Salvar minha conta</span>
        </label>

        <button type="submit" class="btn-laranja btn-login">
          <span class="btn-label">💣 SEM PINO 💣</span>
          <span class="btn-spark"></span>
        </button>

        <p class="auth-switch">
          Primeiro acesso? <button type="button" id="go-cadastro">Criar conta</button>
        </p>

        <div id="login-error" class="error-msg"></div>
      </form>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- TELA DE CADASTRO                             -->
  <!-- ============================================ -->
  <section id="screen-cadastro" class="screen">
    <div class="auth-card">
      <div class="logo-wrap">
        <div class="granada-logo small">
          <div class="granada-body"></div>
          <div class="granada-anel"></div>
          <div class="granada-pino"></div>
          <div class="granada-spark"></div>
        </div>
        <h2 class="logo-title">CRIAR CONTA</h2>
        <p class="logo-sub">Bem-vindo à equipe</p>
      </div>

      <form id="form-cadastro" class="auth-form">
        <div class="field">
          <label for="cad-user">Username</label>
          <select id="cad-user" required>
            <option value="">— escolha seu nome —</option>
            <option value="tuty">Tuty</option>
            <option value="primos">Primos</option>
            <option value="kaio">Kaio</option>
            <option value="felipao">Felipão</option>
            <option value="gabriel">Gabriel</option>
            <option value="bk">Bk</option>
            <option value="jp">Jp</option>
            <option value="dieguinho">Dieguinho</option>
          </select>
        </div>

        <div class="field">
          <label for="cad-pass">Senha</label>
          <div class="pass-wrap">
            <input type="password" id="cad-pass" minlength="6" placeholder="mín. 6 caracteres" required>
            <button type="button" class="pass-toggle" data-target="cad-pass" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="cad-pass2">Confirmar senha</label>
          <div class="pass-wrap">
            <input type="password" id="cad-pass2" minlength="6" placeholder="repita a senha" required>
            <button type="button" class="pass-toggle" data-target="cad-pass2" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-laranja">
          <span class="btn-label">CRIAR CONTA</span>
          <span class="btn-spark"></span>
        </button>

        <p class="auth-switch">
          Já tem conta? <button type="button" id="go-login">Fazer login</button>
        </p>

        <div id="cad-error" class="error-msg"></div>
      </form>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- PAINEL PRINCIPAL                             -->
  <!-- ============================================ -->
  <section id="screen-painel" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <div class="granada-logo mini">
          <div class="granada-body"></div>
          <div class="granada-anel"></div>
          <div class="granada-pino"></div>
        </div>
        <div>
          <div class="topbar-title">SEM PINO</div>
          <div class="topbar-sub">Painel da Equipe</div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="ciclo-info">
          <span class="ciclo-label">CICLO ATUAL</span>
          <span id="ciclo-numero" class="ciclo-num">#1</span>
        </div>
        <div class="user-chip">
          <span id="user-nome">—</span>
          <span id="user-badge" class="badge-adm" style="display:none;">ADM</span>
          <button id="btn-logout" class="btn-logout" title="Sair">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="ranking">🏆 Ranking</button>
      <button class="tab" data-tab="metricas">📊 Métricas</button>
      <button class="tab" data-tab="historico">📅 Histórico</button>
    </nav>

    <!-- TAB: RANKING -->
    <div id="tab-ranking" class="tab-content active">
      <div id="ranking-grid" class="ranking-grid"></div>
    </div>

    <!-- TAB: MÉTRICAS -->
    <div id="tab-metricas" class="tab-content">
      <div class="metricas-resumo" id="metricas-resumo"></div>
      <div class="metricas-tabela-wrap">
        <table class="metricas-tabela">
          <thead>
            <tr>
              <th>#</th>
              <th>Membro</th>
              <th>🔵</th>
              <th>🟨</th>
              <th>🟥</th>
              <th>Saldo</th>
            </tr>
          </thead>
          <tbody id="metricas-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- TAB: HISTÓRICO -->
    <div id="tab-historico" class="tab-content">
      <div class="historico-controls">
        <label for="select-ciclo">Ciclo:</label>
        <select id="select-ciclo"></select>
      </div>
      <div class="metricas-tabela-wrap">
        <table class="metricas-tabela">
          <thead>
            <tr>
              <th>#</th>
              <th>Membro</th>
              <th>🔵</th>
              <th>🟨</th>
              <th>🟥</th>
              <th>Saldo</th>
            </tr>
          </thead>
          <tbody id="historico-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- CAMADA DE ANIMAÇÃO DE CARTÃO                 -->
  <!-- ============================================ -->
  <div id="anim-layer"></div>

  <!-- ============================================ -->
  <!-- TOAST                                        -->
  <!-- ============================================ -->
  <div id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
